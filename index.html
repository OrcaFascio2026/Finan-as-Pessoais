<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financas Pessoais</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--bg2:#1a1d27;--bg3:#22263a;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);--text:#f0f2ff;--muted:#8b90a7;--green:#00e89a;--green-dim:rgba(0,232,154,0.12);--red:#ff5c7a;--red-dim:rgba(255,92,122,0.12);--blue:#5b8cff;--blue-dim:rgba(91,140,255,0.12);--gold:#ffca44;--radius:14px;--radius-sm:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#setup{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
.card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:2rem;width:100%;max-width:500px}
h1{font-size:1.5rem;font-weight:700;margin-bottom:.5rem}
p.sub{color:var(--muted);font-size:.88rem;margin-bottom:1.5rem}
label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:5px}
input,select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;color:var(--text);font-family:'Inter',sans-serif;font-size:.88rem;outline:none;margin-bottom:1rem}
input:focus,select:focus{border-color:var(--blue)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 20px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-family:'Inter',sans-serif;font-size:.88rem;font-weight:500;transition:all .2s;width:100%}
.btn-blue{background:var(--blue);color:#fff}
.btn-blue:hover{filter:brightness(1.15)}
.btn-ghost{background:var(--bg3);color:var(--muted);border:1px solid var(--border);width:auto;padding:7px 14px;font-size:.82rem}
.btn-ghost:hover{color:var(--text)}
#errmsg{color:var(--red);font-size:.82rem;margin-bottom:.8rem;display:none}
/* APP */
#app{display:none}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:.9rem 1.5rem;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:10}
.logo{font-size:1rem;font-weight:700;color:var(--green)}
.month-sel{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 10px;color:var(--text);font-family:'Inter',sans-serif;font-size:.82rem;outline:none;margin:0}
.topbar-r{display:flex;align-items:center;gap:8px}
.utag{font-size:.75rem;color:var(--muted);background:var(--bg3);border:1px solid var(--border);padding:4px 10px;border-radius:20px}
.main{padding:1.5rem;max-width:1100px;margin:0 auto}
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:1.5rem}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem 1.3rem;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.sc.g::before{background:var(--green)}.sc.r::before{background:var(--red)}.sc.b::before{background:var(--blue)}.sc.gold::before{background:var(--gold)}
.sc-label{font-size:.75rem;color:var(--muted);margin-bottom:7px;text-transform:uppercase;letter-spacing:.05em}
.sc-val{font-family:'JetBrains Mono',monospace;font-size:1.5rem;font-weight:600}
.sc-val.g{color:var(--green)}.sc-val.r{color:var(--red)}.sc-val.b{color:var(--blue)}.sc-val.gold{color:var(--gold)}
.cgrid{display:grid;grid-template-columns:1fr 360px;gap:1.5rem}
@media(max-width:900px){.cgrid{grid-template-columns:1fr}}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1.3rem}
.panel-title{font-size:.92rem;font-weight:600;margin-bottom:1rem}
.col{display:flex;flex-direction:column;gap:1.5rem}
/* type toggle */
.ttoggle{display:flex;gap:6px;margin-bottom:1rem}
.tbtn{flex:1;padding:8px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Inter',sans-serif;font-size:.83rem;cursor:pointer;transition:all .2s;font-weight:500}
.tbtn.ai{background:var(--green-dim);border-color:var(--green);color:var(--green)}
.tbtn.ae{background:var(--red-dim);border-color:var(--red);color:var(--red)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.frow input,.frow select{margin-bottom:0}
.addbtn{background:var(--blue);color:#fff;border:none;border-radius:var(--radius-sm);padding:10px;width:100%;font-family:'Inter',sans-serif;font-size:.88rem;font-weight:500;cursor:pointer;margin-top:.5rem;transition:filter .2s}
.addbtn:hover{filter:brightness(1.15)}
.addbtn:disabled{opacity:.5;cursor:not-allowed}
/* filters */
.fbar{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.fchip{padding:4px 12px;border-radius:20px;font-size:.76rem;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif}
.fchip.active{background:var(--blue-dim);border-color:var(--blue);color:var(--blue)}
/* tx list */
.txlist{display:flex;flex-direction:column;gap:5px;max-height:460px;overflow-y:auto}
.txlist::-webkit-scrollbar{width:3px}
.txlist::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.txi{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:var(--radius-sm);background:var(--bg3);border:1px solid var(--border)}
.txi:hover{border-color:var(--border2)}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.dot.i{background:var(--green)}.dot.e{background:var(--red)}
.tinfo{flex:1;min-width:0}
.tdesc{font-size:.85rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tmeta{font-size:.72rem;color:var(--muted)}
.tamt{font-family:'JetBrains Mono',monospace;font-size:.88rem;font-weight:600;flex-shrink:0}
.tamt.i{color:var(--green)}.tamt.e{color:var(--red)}
.tdel{background:none;border:none;color:var(--muted);cursor:pointer;padding:3px 5px;border-radius:4px;font-size:.8rem;transition:all .15s}
.tdel:hover{color:var(--red);background:var(--red-dim)}
.empty{text-align:center;padding:2rem;color:var(--muted);font-size:.83rem}
.loading{text-align:center;padding:1.5rem;color:var(--muted);font-size:.83rem}
/* chart */
.chwrap{position:relative;height:210px}
/* categories */
.catlist{display:flex;flex-direction:column;gap:8px}
.catitem{display:flex;align-items:center;gap:8px}
.catlabel{font-size:.76rem;color:var(--muted);min-width:90px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.catbar{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.catfill{height:100%;border-radius:3px;transition:width .5s}
.catval{font-family:'JetBrains Mono',monospace;font-size:.76rem;font-weight:600;min-width:75px;text-align:right}
/* toast */
#toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:11px 16px;font-size:.83rem;z-index:999;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none}
#toast.show{opacity:1;transform:translateY(0)}
#toast.ok{border-color:var(--green);color:var(--green)}
#toast.err{border-color:var(--red);color:var(--red)}
</style>
</head>
<body>

<div id="setup">
  <div class="card">
    <h1>Financas Pessoais</h1>
    <p class="sub">Informe suas credenciais do Supabase para comecar.</p>
    <label>Supabase URL</label>
    <input type="text" id="f-url" placeholder="https://xxxx.supabase.co">
    <label>Supabase Anon Key</label>
    <input type="text" id="f-key" placeholder="eyJhbGci...">
    <label>Seu nome (identifica seus dados)</label>
    <input type="text" id="f-uid" placeholder="ex: gabriel">
    <div id="errmsg"></div>
    <button class="btn btn-blue" onclick="doConnect()">Conectar e entrar</button>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <span class="logo">Financas</span>
      <select class="month-sel" id="month-sel" onchange="loadData()"></select>
    </div>
    <div class="topbar-r">
      <span class="utag" id="utag"></span>
      <button class="btn-ghost" onclick="doLogout()">Sair</button>
    </div>
  </div>

  <div class="main">
    <div class="sgrid">
      <div class="sc g"><div class="sc-label">Receitas</div><div class="sc-val g" id="s-inc">R$ 0</div></div>
      <div class="sc r"><div class="sc-label">Gastos</div><div class="sc-val r" id="s-exp">R$ 0</div></div>
      <div class="sc b"><div class="sc-label">Saldo</div><div class="sc-val b" id="s-bal">R$ 0</div></div>
      <div class="sc gold"><div class="sc-label">Lancamentos</div><div class="sc-val gold" id="s-cnt">0</div></div>
    </div>

    <div class="cgrid">
      <div class="col">
        <div class="panel">
          <div class="panel-title">Visao do mes</div>
          <div class="chwrap"><canvas id="ch"></canvas></div>
        </div>
        <div class="panel">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
            <span class="panel-title" style="margin:0">Lancamentos</span>
            <div class="fbar" style="margin:0">
              <button class="fchip active" onclick="setFilter(this,'all')">Todos</button>
              <button class="fchip" onclick="setFilter(this,'income')">Receitas</button>
              <button class="fchip" onclick="setFilter(this,'expense')">Gastos</button>
            </div>
          </div>
          <div class="txlist" id="txlist"><div class="loading">Carregando...</div></div>
        </div>
      </div>

      <div class="col">
        <div class="panel">
          <div class="panel-title">Nova transacao</div>
          <div class="ttoggle">
            <button class="tbtn ai" id="btn-i" onclick="setType('income')">Receita</button>
            <button class="tbtn" id="btn-e" onclick="setType('expense')">Gasto</button>
          </div>
          <label>Descricao</label>
          <input type="text" id="t-desc" placeholder="ex: Salario, Mercado...">
          <div class="frow">
            <div><label>Valor (R$)</label><input type="number" id="t-amt" placeholder="0.00" min="0" step="0.01"></div>
            <div><label>Data</label><input type="date" id="t-date"></div>
          </div>
          <label>Categoria</label>
          <select id="t-cat">
            <option value="">-- Selecione --</option>
            <option>Salario</option><option>Freelance</option><option>Investimentos</option>
            <option>Moradia</option><option>Alimentacao</option><option>Transporte</option>
            <option>Saude</option><option>Educacao</option><option>Lazer</option>
            <option>Compras</option><option>Assinaturas</option><option>Outros</option>
          </select>
          <button class="addbtn" id="addbtn" onclick="addTx()">Adicionar</button>
        </div>

        <div class="panel">
          <div class="panel-title">Gastos por categoria</div>
          <div class="catlist" id="catlist"><div class="empty">Sem dados ainda</div></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
var DB = null;
var UID = '';
var FILTER = 'all';
var TTYPE = 'income';
var ALL = [];
var CHART = null;
var COLORS = {'Salario':'#00e89a','Freelance':'#5b8cff','Investimentos':'#ffca44','Moradia':'#ff5c7a','Alimentacao':'#ff9f44','Transporte':'#f97316','Saude':'#ec4899','Educacao':'#8b5cf6','Lazer':'#06b6d4','Compras':'#e11d48','Assinaturas':'#84cc16','Outros':'#6b7280'};

function getSB() { return window.supabase.createClient; }

function doConnect() {
  var url = document.getElementById('f-url').value.trim();
  var key = document.getElementById('f-key').value.trim();
  var uid = document.getElementById('f-uid').value.trim().toLowerCase().replace(/\s+/g,'_');
  var em = document.getElementById('errmsg');
  if (!url || !key || !uid) { em.textContent='Preencha todos os campos.'; em.style.display='block'; return; }
  em.style.display='none';
  try {
    var createClient = window.supabase.createClient;
    var client = createClient(url, key);
    client.from('transactions').select('id').limit(1).then(function(res) {
      if (res.error) { em.textContent='Erro: '+res.error.message; em.style.display='block'; return; }
      localStorage.setItem('sb_u', url);
      localStorage.setItem('sb_k', key);
      localStorage.setItem('sb_id', uid);
      DB = client; UID = uid;
      startApp();
    });
  } catch(e) {
    em.textContent='Erro: '+e.message; em.style.display='block';
  }
}

function doLogout() {
  localStorage.removeItem('sb_u'); localStorage.removeItem('sb_k'); localStorage.removeItem('sb_id');
  location.reload();
}

function startApp() {
  document.getElementById('setup').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('utag').textContent=UID;
  document.getElementById('t-date').value=new Date().toISOString().slice(0,10);
  var sel=document.getElementById('month-sel');
  var now=new Date();
  for(var i=0;i<12;i++){
    var d=new Date(now.getFullYear(),now.getMonth()-i,1);
    var v=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    var l=d.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
    var o=document.createElement('option');
    o.value=v; o.textContent=l[0].toUpperCase()+l.slice(1);
    if(i===0)o.selected=true;
    sel.appendChild(o);
  }
  loadData();
}

function loadData() {
  var month=document.getElementById('month-sel').value;
  var parts=month.split('-'); var yr=parts[0]; var mn=parts[1];
  var from=yr+'-'+mn+'-01';
  var last=new Date(yr,mn,0).getDate();
  var to=yr+'-'+mn+'-'+last;
  document.getElementById('txlist').innerHTML='<div class="loading">Carregando...</div>';
  DB.from('transactions').select('*').eq('user_id',UID).gte('date',from).lte('date',to).order('date',{ascending:false}).then(function(res){
    if(res.error){toast('Erro: '+res.error.message,'err');return;}
    ALL=res.data||[];
    renderAll();
  });
}

function renderAll(){renderSummary();renderList();renderChart();renderCats();}

function renderSummary(){
  var inc=ALL.filter(function(t){return t.type==='income';}).reduce(function(a,t){return a+parseFloat(t.amount);},0);
  var exp=ALL.filter(function(t){return t.type==='expense';}).reduce(function(a,t){return a+parseFloat(t.amount);},0);
  var bal=inc-exp;
  document.getElementById('s-inc').textContent=fmt(inc);
  document.getElementById('s-exp').textContent=fmt(exp);
  document.getElementById('s-bal').textContent=fmt(bal);
  document.getElementById('s-cnt').textContent=ALL.length;
  var el=document.getElementById('s-bal');
  el.className='sc-val '+(bal>=0?'b':'r');
}

function renderList(){
  var list=FILTER==='all'?ALL:ALL.filter(function(t){return t.type===FILTER;});
  var el=document.getElementById('txlist');
  if(!list.length){el.innerHTML='<div class="empty">Nenhum lancamento</div>';return;}
  el.innerHTML=list.map(function(t){
    var cls=t.type==='income'?'i':'e';
    var sig=t.type==='income'?'+':'-';
    return '<div class="txi"><div class="dot '+cls+'"></div><div class="tinfo"><div class="tdesc">'+esc(t.description)+'</div><div class="tmeta">'+fmtDate(t.date)+' - '+(t.category||'Sem categoria')+'</div></div><div class="tamt '+cls+'">'+sig+' '+fmt(t.amount)+'</div><button class="tdel" onclick="delTx(\''+t.id+'\')">x</button></div>';
  }).join('');
}

function renderChart(){
  var ctx=document.getElementById('ch').getContext('2d');
  var days={};
  ALL.forEach(function(t){
    if(!days[t.date])days[t.date]={inc:0,exp:0};
    days[t.date][t.type==='income'?'inc':'exp']+=parseFloat(t.amount);
  });
  var sorted=Object.keys(days).sort();
  var labels=sorted.map(function(d){var p=d.split('-');return p[2]+'/'+p[1];});
  if(CHART)CHART.destroy();
  CHART=new Chart(ctx,{type:'bar',data:{labels:labels,datasets:[
    {label:'Receitas',data:sorted.map(function(d){return days[d].inc;}),backgroundColor:'rgba(0,232,154,0.6)',borderRadius:3},
    {label:'Gastos',data:sorted.map(function(d){return days[d].exp;}),backgroundColor:'rgba(255,92,122,0.6)',borderRadius:3}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8b90a7',font:{family:'Inter',size:11}}}},scales:{x:{ticks:{color:'#8b90a7',font:{size:10}},grid:{color:'rgba(255,255,255,0.04)'}},y:{ticks:{color:'#8b90a7',font:{size:10},callback:function(v){return 'R$'+v.toLocaleString('pt-BR');}},grid:{color:'rgba(255,255,255,0.04)'}}}}});
}

function renderCats(){
  var exp=ALL.filter(function(t){return t.type==='expense';});
  var total=exp.reduce(function(a,t){return a+parseFloat(t.amount);},0);
  var cats={};
  exp.forEach(function(t){var c=t.category||'Outros';cats[c]=(cats[c]||0)+parseFloat(t.amount);});
  var sorted=Object.entries(cats).sort(function(a,b){return b[1]-a[1];});
  var el=document.getElementById('catlist');
  if(!sorted.length){el.innerHTML='<div class="empty">Sem gastos ainda</div>';return;}
  el.innerHTML=sorted.map(function(e){
    var cat=e[0],val=e[1];
    var pct=total?(val/total*100).toFixed(0):0;
    var col=COLORS[cat]||'#8b90a7';
    return '<div class="catitem"><span class="catlabel">'+cat+'</span><div class="catbar"><div class="catfill" style="width:'+pct+'%;background:'+col+'"></div></div><span class="catval" style="color:'+col+'">'+fmt(val)+'</span></div>';
  }).join('');
}

function setType(t){
  TTYPE=t;
  document.getElementById('btn-i').className='tbtn'+(t==='income'?' ai':'');
  document.getElementById('btn-e').className='tbtn'+(t==='expense'?' ae':'');
}

function setFilter(el,f){
  FILTER=f;
  document.querySelectorAll('.fchip').forEach(function(c){c.classList.remove('active');});
  el.classList.add('active');
  renderList();
}

function addTx(){
  var desc=document.getElementById('t-desc').value.trim();
  var amt=parseFloat(document.getElementById('t-amt').value);
  var date=document.getElementById('t-date').value;
  var cat=document.getElementById('t-cat').value;
  if(!desc){toast('Informe a descricao','err');return;}
  if(!amt||amt<=0){toast('Informe um valor valido','err');return;}
  if(!date){toast('Informe a data','err');return;}
  var btn=document.getElementById('addbtn');
  btn.disabled=true; btn.textContent='Salvando...';
  DB.from('transactions').insert({user_id:UID,type:TTYPE,description:desc,amount:amt,date:date,category:cat||null}).then(function(res){
    if(res.error){toast('Erro: '+res.error.message,'err');btn.disabled=false;btn.textContent='Adicionar';return;}
    document.getElementById('t-desc').value='';
    document.getElementById('t-amt').value='';
    document.getElementById('t-cat').value='';
    toast('Adicionado!','ok');
    btn.disabled=false; btn.textContent='Adicionar';
    loadData();
  });
}

function delTx(id){
  if(!confirm('Excluir?'))return;
  DB.from('transactions').delete().eq('id',id).eq('user_id',UID).then(function(res){
    if(res.error){toast('Erro: '+res.error.message,'err');return;}
    toast('Excluido!','ok');
    ALL=ALL.filter(function(t){return t.id!==id;});
    renderAll();
  });
}

function fmt(v){return 'R$ '+parseFloat(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtDate(d){var p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
var toastT;
function toast(msg,type){var el=document.getElementById('toast');el.textContent=msg;el.className='show '+(type||'');clearTimeout(toastT);toastT=setTimeout(function(){el.className='';},3000);}

// Auto login
(function(){
  var u=localStorage.getItem('sb_u');
  var k=localStorage.getItem('sb_k');
  var id=localStorage.getItem('sb_id');
  if(u&&k&&id){
    try{
      DB=window.supabase.createClient(u,k);
      UID=id;
      startApp();
    }catch(e){}
  }
})();
</script>
</body>
</html>
